name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g., v0.0.1)'
        required: true
        default: 'v0.0.1'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release Addon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Run mise zip tasks
        run: |
          mise run zip
          mise run zip-nolib
          mv PunchThrough.zip "PunchThrough-${{ github.event.inputs.version }}.zip"
          mv PunchThrough-nolib.zip "PunchThrough-nolib-${{ github.event.inputs.version }}.zip"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            "PunchThrough-${{ github.event.inputs.version }}.zip" \
            "PunchThrough-nolib-${{ github.event.inputs.version }}.zip" \
            --title "Release ${{ github.event.inputs.version }}" \
            --notes "Manual release for version ${{ github.event.inputs.version }}."
