[tasks.fetch]
description = "Fetch external Ace3, LibStub, and CallbackHandler libraries locally"
run = "./fetch_libs.sh"

[tasks.zip]
description = "Create a complete release zip of the PunchThrough addon (including Libs)"
depends = ["fetch"]
run = """
rm -f PunchThrough.zip
zip -r PunchThrough.zip PunchThrough
echo "Complete release archive created: PunchThrough.zip"
"""

[tasks.zip-nolib]
description = "Create a nolib release zip (excluding Libs, letting CurseForge packager handle dependencies)"
run = """
rm -f PunchThrough-nolib.zip
zip -r PunchThrough-nolib.zip PunchThrough -x "PunchThrough/Libs/*"
echo "Nolib release archive created: PunchThrough-nolib.zip"
"""
